<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LapTime-Vision 視覺計時系統</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@600;700&family=Noto+Sans+TC:wght@400;700&display=swap');

        :root {
            --bg: #0a0e1a;
            --panel: #121929;
            --border: #1e2d4a;
            --accent: #00d4ff;
            --accent2: #ff6b35;
            --green: #00e676;
            --red: #ff1744;
            --yellow: #ffea00;
            --text: #e8f4fc;
            --muted: #7a9ab5;
            --card: #162035;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Noto Sans TC', sans-serif;
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* ===== SETUP SECTION ===== */
        #setup-section {
            padding: 20px;
            flex-grow: 1;
            overflow-y: auto;
            background: var(--bg);
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .setup-header {
            text-align: center;
            padding: 12px 0;
            border-bottom: 1px solid var(--border);
        }
        .setup-header h1 {
            font-family: 'Rajdhani', sans-serif;
            font-size: 1.8rem;
            color: var(--accent);
            letter-spacing: 2px;
        }
        .setup-header p { color: var(--muted); font-size: 0.85rem; margin-top: 4px; }

        .setup-group {
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 16px;
        }
        .setup-group .group-title {
            font-size: 0.8rem;
            font-weight: 700;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 12px;
        }

        select, input[type="text"], input[type="number"], textarea {
            width: 100%;
            padding: 10px 12px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text);
            font-size: 0.95rem;
            font-family: 'Noto Sans TC', sans-serif;
            margin-top: 6px;
        }
        select:focus, input:focus, textarea:focus {
            outline: none;
            border-color: var(--accent);
        }
        textarea { resize: vertical; }

        .btn-primary {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, var(--accent), #0099bb);
            border: none;
            border-radius: 8px;
            color: #000;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            letter-spacing: 1px;
            margin-top: 6px;
        }
        .btn-secondary {
            width: 100%;
            padding: 10px;
            background: var(--card);
            border: 1px solid var(--accent2);
            border-radius: 8px;
            color: var(--accent2);
            font-size: 0.95rem;
            font-weight: 700;
            cursor: pointer;
            margin-top: 6px;
        }

        /* ===== SCANNER MODAL ===== */
        #scanner-modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.95);
            z-index: 1000;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding: 20px;
            overflow-y: auto;
            gap: 14px;
        }
        #scanner-modal.active { display: flex; }
        .scanner-title {
            font-family: 'Rajdhani', sans-serif;
            font-size: 1.4rem;
            color: var(--accent);
            letter-spacing: 2px;
        }
        #scanner-container {
            position: relative;
            width: 100%;
            max-width: 400px;
            border-radius: 12px;
            overflow: hidden;
            border: 2px solid var(--accent);
        }
        #scanner-video { width: 100%; display: block; object-fit: cover; }
        #scanner-overlay {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 160px; height: 120px;
            border: 3px dashed var(--yellow);
            box-shadow: 0 0 0 9999px rgba(0,0,0,0.45);
            pointer-events: none;
        }
        .scanner-overlay-label {
            position: absolute;
            bottom: 6px; left: 50%;
            transform: translateX(-50%);
            font-size: 0.7rem; color: var(--yellow);
            background: rgba(0,0,0,0.7);
            padding: 2px 8px; border-radius: 4px;
        }
        .scanner-btns { display: flex; gap: 10px; width: 100%; max-width: 400px; }
        .scanner-btns button {
            flex: 1; padding: 12px;
            border: none; border-radius: 8px;
            font-weight: 700; font-size: 0.95rem; cursor: pointer;
        }
        #btn-capture { background: var(--green); color: #000; }
        #btn-close-scan { background: var(--red); color: white; }

        /* ===== OCR 辨識結果面板 ===== */
        #ocr-result-panel {
            display: none;
            width: 100%; max-width: 400px;
            background: var(--panel);
            border: 2px solid var(--yellow);
            border-radius: 10px;
            padding: 14px;
            gap: 10px;
            flex-direction: column;
        }
        #ocr-result-panel.active { display: flex; }
        .ocr-result-title { font-size: 0.8rem; color: var(--yellow); font-weight: 700; }
        .ocr-detected-num {
            font-family: 'Rajdhani', sans-serif;
            font-size: 2.5rem;
            color: white;
            text-align: center;
            letter-spacing: 4px;
            background: #1e1e1e;
            border-radius: 8px;
            padding: 8px;
        }
        .ocr-color-preview {
            display: flex; gap: 10px; align-items: center;
            font-size: 0.85rem; color: var(--muted);
        }
        .color-chip {
            width: 30px; height: 30px;
            border-radius: 6px;
            border: 1px solid #333;
        }
        .ocr-confirm-row { display: flex; gap: 8px; }
        .ocr-confirm-row button {
            flex: 1; padding: 10px;
            border: none; border-radius: 8px;
            font-weight: 700; font-size: 0.9rem; cursor: pointer;
        }
        #btn-ocr-correct { background: var(--green); color: #000; }
        #btn-ocr-wrong { background: var(--red); color: white; }
        .manual-override-row {
            display: none;
            gap: 8px;
            align-items: center;
        }
        .manual-override-row.active { display: flex; }
        .manual-override-row input {
            flex: 1; margin-top: 0;
            font-family: 'Rajdhani', sans-serif;
            font-size: 1.2rem;
            text-align: center;
        }
        .manual-override-row button {
            padding: 10px 16px;
            background: var(--accent);
            border: none; border-radius: 6px;
            color: #000; font-weight: 700; cursor: pointer;
        }

        /* ===== 視覺特徵清單 ===== */
        #profile-list { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 8px; }
        .profile-badge {
            display: flex; align-items: center; gap: 6px;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 4px 10px 4px 6px;
            font-size: 0.85rem;
        }
        .profile-badge .badge-num {
            font-family: 'Rajdhani', sans-serif;
            font-weight: 700;
            font-size: 1rem;
            color: var(--yellow);
        }
        .profile-badge .badge-colors { display: flex; gap: 3px; }
        .profile-badge .badge-colors span {
            width: 14px; height: 14px;
            border-radius: 3px;
            border: 1px solid #333;
            display: inline-block;
        }

        /* ===== TEST SECTION ===== */
        #test-section { display: none; flex-direction: column; height: 100vh; }

        /* Top bar */
        #top-bar {
            background: var(--panel);
            border-bottom: 1px solid var(--border);
            padding: 8px 12px;
            flex-shrink: 0;
        }
        #timer {
            font-family: 'Rajdhani', sans-serif;
            font-size: 3rem;
            font-weight: 700;
            color: var(--accent);
            text-align: center;
            letter-spacing: 3px;
            line-height: 1;
            margin-bottom: 6px;
        }
        .control-btns { display: flex; flex-wrap: wrap; gap: 6px; justify-content: center; }
        .ctrl-btn {
            padding: 7px 14px;
            font-size: 0.85rem;
            font-weight: 700;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            letter-spacing: 0.5px;
        }
        #btn-start { background: var(--green); color: #000; }
        #btn-pause, #btn-zero, #btn-finish { display: none; }
        #btn-pause { background: var(--accent2); color: white; }
        #btn-zero { background: #9C27B0; color: white; }
        #btn-finish { background: var(--accent); color: #000; }
        #btn-reset { background: var(--red); color: white; }
        #btn-fullscreen { background: var(--card); color: var(--muted); border: 1px solid var(--border); }
        #btn-edit-line { background: #5c35ff; color: white; }

        /* AI confirm queue */
        #ai-queue-bar {
            background: #1a1000;
            border-bottom: 2px solid var(--accent2);
            padding: 8px 10px;
            flex-shrink: 0;
            display: flex;
            overflow-x: auto;
            gap: 8px;
            min-height: 58px;
            align-items: center;
        }
        .queue-label {
            font-size: 0.7rem;
            font-weight: 700;
            color: var(--accent2);
            white-space: nowrap;
            margin-right: 4px;
            line-height: 1.3;
        }
        .ai-card {
            background: var(--card);
            border: 1.5px solid var(--accent2);
            border-radius: 8px;
            padding: 5px 8px;
            display: flex;
            align-items: center;
            gap: 7px;
            white-space: nowrap;
            flex-shrink: 0;
            animation: popIn 0.25s ease;
        }
        @keyframes popIn { from { transform: scale(0.6); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        .ai-card .bib-tag {
            font-family: 'Rajdhani', sans-serif;
            font-size: 1.3rem;
            font-weight: 700;
            background: #222;
            color: var(--yellow);
            padding: 2px 7px;
            border-radius: 5px;
            min-width: 32px;
            text-align: center;
        }
        .ai-card .ai-name { font-size: 0.85rem; font-weight: 700; line-height: 1.3; }
        .ai-card .ai-time { font-size: 0.7rem; color: var(--muted); }
        .ai-card .ai-ok { background: var(--green); color: #000; border: none; border-radius: 4px; padding: 4px 9px; font-weight: 700; cursor: pointer; font-size: 0.85rem; }
        .ai-card .ai-no { background: var(--red); color: white; border: none; border-radius: 4px; padding: 4px 9px; font-weight: 700; cursor: pointer; font-size: 0.85rem; }
        .ai-card .ai-edit { background: #5c35ff; color: white; border: none; border-radius: 4px; padding: 4px 9px; font-weight: 700; cursor: pointer; font-size: 0.85rem; }

        /* Camera section */
        #camera-section {
            height: 200px;
            background: #000;
            position: relative;
            flex-shrink: 0;
            overflow: hidden;
        }
        #viewfinder {
            width: 100%; height: 100%;
            object-fit: cover;
            display: block;
        }
        #finish-line-canvas {
            position: absolute;
            inset: 0;
            pointer-events: none;
            z-index: 10;
        }
        #finish-line-canvas.editable { pointer-events: all; cursor: crosshair; }

        /* Finish line edit overlay */
        #line-edit-overlay {
            display: none;
            position: absolute;
            inset: 0;
            background: rgba(92,53,255,0.3);
            z-index: 9;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 8px;
        }
        #line-edit-overlay.active { display: flex; }
        .line-edit-hint {
            background: rgba(0,0,0,0.8);
            color: var(--yellow);
            font-size: 0.85rem;
            font-weight: 700;
            padding: 6px 14px;
            border-radius: 20px;
        }
        .line-edit-buttons {
            display: flex;
            gap: 8px;
        }
        .line-edit-buttons button {
            padding: 7px 16px;
            border: none;
            border-radius: 6px;
            font-weight: 700;
            font-size: 0.85rem;
            cursor: pointer;
        }
        #btn-save-line { background: var(--green); color: #000; }
        #btn-reset-line { background: var(--accent2); color: white; }

        #vision-canvas { display: none; }
        #btn-simulate { position: absolute; right: 8px; bottom: 8px; z-index: 20; background: rgba(92,53,255,0.85); color: white; border: none; border-radius: 5px; padding: 5px 8px; font-size: 0.7rem; cursor: pointer; }

        /* Student grid */
        #student-section { padding: 10px; overflow-y: auto; flex-grow: 1; }
        #student-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(85px, 1fr));
            gap: 8px;
        }
        .student-btn {
            padding: 10px 5px;
            font-size: 0.9rem;
            border: 1px solid var(--border);
            border-radius: 8px;
            cursor: pointer;
            background: var(--card);
            color: var(--text);
            transition: all 0.15s;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 2px;
        }
        .student-btn:active { transform: scale(0.94); }
        .student-btn .bib-badge {
            font-family: 'Rajdhani', sans-serif;
            font-size: 1rem;
            font-weight: 700;
            color: var(--yellow);
            background: rgba(0,0,0,0.4);
            padding: 1px 7px;
            border-radius: 10px;
        }
        .student-btn span { font-size: 0.8rem; opacity: 0.85; }
        .student-btn.running { background: #0d2a3a; border-color: var(--accent); }
        .student-btn.last-lap { background: #2a0d1a; border-color: var(--red); }
        .student-btn.finished { background: #111; border-color: #333; color: #555; pointer-events: none; }
        .student-btn.just-crossed { background: #0a2a14; border-color: var(--green); }

        /* Manual correction modal */
        #correction-modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.85);
            z-index: 500;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        #correction-modal.active { display: flex; }
        .correction-box {
            background: var(--panel);
            border: 2px solid var(--accent2);
            border-radius: 12px;
            padding: 20px;
            width: 100%;
            max-width: 360px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .correction-box h3 {
            font-family: 'Rajdhani', sans-serif;
            font-size: 1.3rem;
            color: var(--accent2);
        }
        .correction-box .detected-num-display {
            font-family: 'Rajdhani', sans-serif;
            font-size: 3rem;
            text-align: center;
            color: white;
            background: #1a1a1a;
            border-radius: 8px;
            padding: 6px;
            letter-spacing: 4px;
        }
        .correction-box p { font-size: 0.85rem; color: var(--muted); }
        .correction-box input {
            font-family: 'Rajdhani', sans-serif;
            font-size: 1.5rem;
            text-align: center;
            letter-spacing: 3px;
        }
        .correction-btns { display: flex; gap: 8px; }
        .correction-btns button {
            flex: 1; padding: 11px;
            border: none; border-radius: 8px;
            font-weight: 700; font-size: 0.95rem; cursor: pointer;
        }
        #btn-correction-confirm { background: var(--green); color: #000; }
        #btn-correction-cancel { background: var(--card); color: var(--muted); border: 1px solid var(--border); }

        /* Download overlay */
        #download-section {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.92);
            z-index: 200;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 20px;
        }
        #download-section.active { display: flex; }
        #download-section h2 { font-family: 'Rajdhani', sans-serif; font-size: 2rem; color: var(--green); }
        .dl-btn {
            width: 80%; max-width: 360px;
            padding: 15px;
            border: none;
            border-radius: 10px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
        }
        #btn-dl-excel { background: var(--green); color: #000; }
        #btn-close-download { background: var(--card); color: var(--muted); border: 1px solid var(--border); }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 4px; height: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
    </style>
</head>
<body>

<!-- ===================== SETUP SECTION ===================== -->
<div id="setup-section">
    <div class="setup-header">
        <h1>⚡ LapTime-Vision v2</h1>
        <p>智慧視覺跑步計時系統</p>
    </div>

    <!-- 基本參數 -->
    <div class="setup-group">
        <div class="group-title">📋 測驗基本參數</div>
        <input type="text" id="input-test-name" placeholder="測驗名稱 / 班級">
        <select id="sel-distance" style="margin-top:8px;">
            <option value="800">800 公尺</option>
            <option value="1600" selected>1600 公尺</option>
        </select>
        <select id="sel-track" style="margin-top:8px;">
            <option value="200" selected>200 公尺跑道</option>
            <option value="300">300 公尺跑道</option>
            <option value="400">400 公尺跑道</option>
        </select>
    </div>

    <!-- 相機 -->
    <div class="setup-group">
        <div class="group-title">📷 主攝影機 (越線偵測)</div>
        <select id="sel-camera"></select>
    </div>

    <!-- 號碼衣特徵學習 -->
    <div class="setup-group">
        <div class="group-title">🎽 號碼衣視覺學習</div>
        <button class="btn-secondary" onclick="openScanner()">📸 啟動相機辨識號碼衣</button>
        <div id="profile-list"></div>
        <p style="font-size:0.78rem; color:var(--muted); margin-top:10px;">格式：[號碼] [姓名]（例：15 王小明）</p>
        <textarea id="manual-names" rows="5" placeholder="1 王小明&#10;12 陳大喵&#10;23 李小華"></textarea>
    </div>

    <button class="btn-primary" onclick="startSetup()">進入視覺計時畫面 →</button>
</div>

<!-- ===================== SCANNER MODAL ===================== -->
<div id="scanner-modal">
    <div class="scanner-title">🎽 號碼衣特徵學習</div>
    <p style="color:var(--muted); font-size:0.85rem; text-align:center;">將號碼衣置於黃色虛線框中，拍攝後確認辨識結果</p>

    <div id="scanner-container">
        <video id="scanner-video" autoplay playsinline muted></video>
        <div id="scanner-overlay"></div>
        <div class="scanner-overlay-label">號碼衣對準此區域</div>
    </div>
    <canvas id="snapshot-canvas" style="display:none;"></canvas>

    <!-- OCR 結果面板 -->
    <div id="ocr-result-panel">
        <div class="ocr-result-title">🔍 系統辨識結果</div>
        <div id="ocr-detected-num" class="ocr-detected-num">--</div>
        <div class="ocr-color-preview">
            <span>底色</span>
            <div id="bib-color-chip" class="color-chip"></div>
            <span style="margin-left:10px;">字色</span>
            <div id="text-color-chip" class="color-chip"></div>
        </div>
        <p style="font-size:0.8rem; color:var(--muted);">辨識是否正確？</p>
        <div class="ocr-confirm-row">
            <button id="btn-ocr-correct" onclick="confirmOcrResult()">✔️ 正確</button>
            <button id="btn-ocr-wrong" onclick="showManualOcrInput()">✏️ 手動修正</button>
        </div>
        <div id="manual-override-row" class="manual-override-row">
            <input type="number" id="manual-bib-input" placeholder="輸入正確號碼">
            <button onclick="saveManualBib()">確認</button>
        </div>
    </div>

    <div class="scanner-btns">
        <button id="btn-capture" onclick="captureAndAnalyze()">📸 擷取分析</button>
        <button id="btn-close-scan" onclick="closeScanner()">完成 / 關閉</button>
    </div>
</div>

<!-- ===================== TEST SECTION ===================== -->
<div id="test-section">
    <!-- Timer + Controls -->
    <div id="top-bar">
        <div id="timer">00:00.00</div>
        <div class="control-btns">
            <button id="btn-fullscreen" class="ctrl-btn" onclick="toggleFullScreen()">全螢幕</button>
            <button id="btn-reset" class="ctrl-btn" onclick="location.reload()">⬅ 設定</button>
            <button id="btn-zero" class="ctrl-btn" onclick="zeroTimer()">歸零</button>
            <button id="btn-finish" class="ctrl-btn" onclick="finishTest()">結束測驗</button>
            <button id="btn-pause" class="ctrl-btn" onclick="pauseTimer()">暫停</button>
            <button id="btn-start" class="ctrl-btn" onclick="startTimer()">🚀 開始 (Go)</button>
            <button id="btn-edit-line" class="ctrl-btn" onclick="toggleLineEdit()">✏️ 調整終點線</button>
        </div>
    </div>

    <!-- AI 待確認緩衝區 -->
    <div id="ai-queue-bar">
        <div class="queue-label">視覺辨識<br><span style="font-size:0.65rem;">待確認</span></div>
        <div id="ai-queue-container" style="display:flex; gap:8px;"></div>
    </div>

    <!-- Camera -->
    <div id="camera-section">
        <video id="viewfinder" autoplay playsinline muted></video>
        <canvas id="finish-line-canvas"></canvas>
        <canvas id="vision-canvas"></canvas>
        <div id="line-edit-overlay">
            <div class="line-edit-hint">📍 步驟1：拖曳畫出終點線 &nbsp;→&nbsp; 步驟2：學習地面顏色</div>
            <div class="line-edit-buttons">
                <button id="btn-learn-ground" onclick="learnGroundColors()" style="background:#ffea00;color:#000;">🎨 學習地面色</button>
                <button id="btn-save-line" onclick="saveFinishLine()">✔️ 確認完成</button>
                <button id="btn-reset-line" onclick="resetFinishLine()">↺ 重設線條</button>

function captureAndAnalyze() {
    const video = document.getElementById('scanner-video');
    const canvas = document.getElementById('snapshot-canvas');
    const ctx = canvas.getContext('2d', { willReadFrequently: true });

    canvas.width = video.videoWidth || 640;
    canvas.height = video.videoHeight || 480;
    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

    // 擷取中央框區域做顏色分析
    const bw = 160, bh = 120;
    const sx = (canvas.width - bw) / 2;
    const sy = (canvas.height - bh) / 2;
    const imgData = ctx.getImageData(sx, sy, bw, bh).data;

    let rSum = 0, gSum = 0, bSum = 0, cnt = 0;
    let darkMin = 255, darkR = 0, darkG = 0, darkB = 0;

    for (let i = 0; i < imgData.length; i += 4) {
        const r = imgData[i], g = imgData[i+1], b = imgData[i+2];
        rSum += r; gSum += g; bSum += b; cnt++;
        const bright = (r*299 + g*587 + b*114) / 1000;
        if (bright < darkMin) { darkMin = bright; darkR = r; darkG = g; darkB = b; }
    }
    const avgR = Math.round(rSum/cnt), avgG = Math.round(gSum/cnt), avgB = Math.round(bSum/cnt);
    const bibHex = rgbToHex(avgR, avgG, avgB);
    const textHex = rgbToHex(darkR, darkG, darkB);

    // 嘗試 OCR 數字辨識（利用對比度推斷）
    // 實際環境可接 Tesseract.js；這裡先用顏色推斷 + 讓老師確認
    const guessedNum = guessNumberFromImage(ctx, sx, sy, bw, bh);

    pendingOcrCapture = { bibHex, textHex, guessedNum };

    // 顯示辨識結果面板
    document.getElementById('ocr-detected-num').textContent = guessedNum || '??';
    document.getElementById('bib-color-chip').style.background = bibHex;
    document.getElementById('text-color-chip').style.background = textHex;
    document.getElementById('ocr-result-panel').classList.add('active');
    document.getElementById('manual-override-row').classList.remove('active');
}

// 簡單模擬 OCR 數字辨識（實際部署可換 Tesseract.js）
function guessNumberFromImage(ctx, sx, sy, bw, bh) {
    // 利用已有 visionProfiles 的顏色相似度來猜測
    // 實際為：返回 null 讓老師輸入；這裡模擬返回隨機號
    return null; // 返回 null = 不確定，讓老師輸入
}

function resetOcrPanel() {

function rgbToHex(r, g, b) {
    return '#' + [r, g, b].map(v => v.toString(16).padStart(2, '0')).join('').toUpperCase();

function setupFinishLineCanvas() {

function drawFinishLine(draft) {
    const flCanvas = document.getElementById('finish-line-canvas');
    const ctx = flCanvas.getContext('2d');
    const w = flCanvas.width, h = flCanvas.height;
    ctx.clearRect(0, 0, w, h);

    const line = draft || finishLine;
    const x1 = line.x1 * w, y1 = line.y1 * h;
    const x2 = line.x2 * w, y2 = line.y2 * h;

    ctx.save();
    if (lineEditMode) {
        ctx.strokeStyle = '#5c35ff';
        ctx.lineWidth = 3;
        ctx.setLineDash([8, 6]);
    } else {
        ctx.strokeStyle = 'rgba(255,30,30,0.8)';
        ctx.lineWidth = 3;
        ctx.setLineDash([]);
        ctx.shadowColor = '#ff1744';
        ctx.shadowBlur = 8;
    }
    ctx.beginPath();
    ctx.moveTo(x1, y1);
    ctx.lineTo(x2, y2);
    ctx.stroke();
    ctx.restore();

    // ★ 有效偵測帶視覺標示（中帶 35%~75%，下方地面忽略區）
    if (!lineEditMode) {
        const bandTopY    = h * 0.35;
        const bandBottomY = h * 0.75;
        // 虛線邊界
        ctx.save();
        ctx.strokeStyle = 'rgba(0,212,255,0.4)';
        ctx.lineWidth = 1;
        ctx.setLineDash([5, 5]);
        ctx.beginPath(); ctx.moveTo(0, bandTopY);    ctx.lineTo(w, bandTopY);    ctx.stroke();
        ctx.beginPath(); ctx.moveTo(0, bandBottomY); ctx.lineTo(w, bandBottomY); ctx.stroke();
        ctx.restore();
        // 有效帶半透明綠色
        ctx.save();
        ctx.fillStyle = 'rgba(0,230,118,0.07)';
        ctx.fillRect(0, bandTopY, w, bandBottomY - bandTopY);
        // 地面忽略帶（橘色提示）
        ctx.fillStyle = 'rgba(255,100,30,0.07)';
        ctx.fillRect(0, bandBottomY, w, h - bandBottomY);
        ctx.restore();
        // 文字標籤
        ctx.save();
        ctx.font = 'bold 10px sans-serif';
        ctx.fillStyle = 'rgba(0,212,255,0.8)';
        ctx.fillText('▶ 有效偵測區（號碼衣）', 4, bandTopY - 3);
        ctx.fillStyle = 'rgba(255,130,50,0.8)';
        ctx.fillText('▶ 地面忽略區（道次號碼不計）', 4, bandBottomY + 11);
        ctx.restore();
    }

    // 終點線標籤
    const mx = (x1 + x2) / 2, my = (y1 + y2) / 2 - 8;
    ctx.save();
    ctx.font = 'bold 11px sans-serif';
    ctx.fillStyle = lineEditMode ? '#5c35ff' : 'rgba(255,30,30,0.9)';
    ctx.fillText('⬛ 虛擬終點線', mx - 40, my);
    ctx.restore();
}

function setupLineDrawing() {
    const flCanvas = document.getElementById('finish-line-canvas');
    flCanvas.addEventListener('mousedown', onLineMouseDown);
    flCanvas.addEventListener('mousemove', onLineMouseMove);
    flCanvas.addEventListener('mouseup', onLineMouseUp);
    flCanvas.addEventListener('touchstart', onLineTouchStart, { passive: false });
    flCanvas.addEventListener('touchmove', onLineTouchMove, { passive: false });
    flCanvas.addEventListener('touchend', onLineTouchEnd);
}

function getCanvasPos(e, canvas) {
    const rect = canvas.getBoundingClientRect();
    const src = e.touches ? e.touches[0] : e;
    return {
        x: (src.clientX - rect.left) / rect.width,
        y: (src.clientY - rect.top) / rect.height
    };
}

function onLineMouseDown(e) {
    if (!lineEditMode) return;
    lineDrawing = true;
    lineDrawStart = getCanvasPos(e, e.currentTarget);
}
function onLineMouseMove(e) {
    if (!lineEditMode || !lineDrawing) return;
    const pos = getCanvasPos(e, e.currentTarget);
    drawFinishLine({ x1: lineDrawStart.x, y1: lineDrawStart.y, x2: pos.x, y2: pos.y });
    tempLine = { x1: lineDrawStart.x, y1: lineDrawStart.y, x2: pos.x, y2: pos.y };
}
function onLineMouseUp(e) {
    if (!lineEditMode || !lineDrawing) return;
    lineDrawing = false;
    if (tempLine) { finishLine = { ...tempLine }; tempLine = null; }
    drawFinishLine();
}
function onLineTouchStart(e) { e.preventDefault(); onLineMouseDown(e); }
function onLineTouchMove(e) { e.preventDefault(); onLineMouseMove(e); }
function onLineTouchEnd(e) { onLineMouseUp(e); }

function toggleLineEdit() {

}

function saveFinishLine() {

        }
    }
}

function resetFinishLine() {
    finishLine = { x1: 0.5, y1: 0, x2: 0.5, y2: 1 };

// ================================================================
// 模組三：實時越線偵測（三層防護，避免地面道次號碼誤判）
// ================================================================

/*
 * ★ 防誤判三層架構 ★
 *
 * 【層1 — 垂直分帶過濾】
 *   跑道地面的道次號碼固定出現在畫面下半部（地面視角）。
 *   系統將攝影畫面垂直分成三帶：
 *     - 上帶 (0%~35%)  : 天空/背景，幾乎無效
 *     - 中帶 (35%~75%) : 人體軀幹高度 ← 有效偵測區（號碼衣在此）
 *     - 下帶 (75%~100%): 跑道地面 ← 忽略區（道次號碼在此）
 *   越線事件只計算中帶的像素變化量，下帶的變化完全忽略。
 *
 * 【層2 — 動態物體驗證（垂直移動特徵）】
 *   地面道次號碼：靜止不動，前後 frame 差異為 0（除光線變化外）。
 *   跑步學生：在畫面中有橫向位移，且身體有垂直晃動。
 *   系統比較靜態背景模型（baselineFrame）與當前 frame 的差值，
 *   僅當變化量集中在中帶且超出靜態閾值時，才認定為「有人移動」。
 *
 * 【層3 — 號碼衣顏色驗證（色彩比對）】
 *   越線觸發後，擷取終點線附近中帶區域的主色，
 *   與設定階段學習的 visionProfiles 做色彩距離比對。
 *   若比對到已知號碼衣顏色 → 信心值提升，直接推薦對應學生。
 *   若偵測到的顏色接近「跑道紅棕色+白色」（地面道次特徵）→ 否決觸發。
 */

// 背景基線（靜止時的畫面，用來過濾地面靜態號碼）
let baselineFrame = null;
let baselineCollectCount = 0;
const BASELINE_FRAMES = 30; // 開始後收集 30 幀建立背景
let baselineReady = false;

// ★ 動態地面顏色模型（由老師在設定終點線時學習，不再寫死）
// 每個 cluster = { r, g, b, tolerance }
let groundColorClusters = [];   // 學習後填入，空陣列 = 尚未學習（退回備用邏輯）
let groundColorLearned = false;

// 從攝影機畫面下帶自動取樣跑道及道次字顏色
function learnGroundColors() {
    const vCanvas = document.getElementById('vision-canvas');
    const ctx = vCanvas.getContext('2d', { willReadFrequently: true });
    const w = vCanvas.width, h = vCanvas.height;
    if (!w || !h) { alert('請等待攝影機畫面載入後再學習！'); return; }

    // 取樣範圍：畫面最下 25%（地面帶），沿整個寬度均勻取 200 個點
    const sampleY_start = Math.floor(h * 0.75);
    const sampleY_end   = Math.floor(h * 0.98);
    const N = 200;
    const samples = [];

    for (let i = 0; i < N; i++) {
        const x = Math.floor(Math.random() * w);
        const y = sampleY_start + Math.floor(Math.random() * (sampleY_end - sampleY_start));
        try {
            const d = ctx.getImageData(x, y, 1, 1).data;
            samples.push({ r: d[0], g: d[1], b: d[2] });
        } catch {}
    }
    if (!samples.length) { alert('取樣失敗，請確認攝影機已啟動！'); return; }

    // 用 k-means (k=2) 把取樣色分成兩群：跑道主色 & 道次字色
    const clusters = kMeans2(samples);

    // 每群加上容許誤差（取群內標準差 × 1.8，最小 30，最大 80）
    groundColorClusters = clusters.map(c => ({
        r: Math.round(c.r), g: Math.round(c.g), b: Math.round(c.b),
        tolerance: Math.min(80, Math.max(30, Math.round(c.stddev * 1.8)))
    }));
    groundColorLearned = true;

    // 更新 UI 預覽
    const preview = document.getElementById('ground-color-preview');
    preview.style.display = 'flex';
    const chip1 = document.getElementById('gcp-track-chip');
    const chip2 = document.getElementById('gcp-line-chip');
    const samplesEl = document.getElementById('gcp-samples');
    chip1.style.background = `rgb(${groundColorClusters[0].r},${groundColorClusters[0].g},${groundColorClusters[0].b})`;
    chip2.style.background = groundColorClusters[1]
        ? `rgb(${groundColorClusters[1].r},${groundColorClusters[1].g},${groundColorClusters[1].b})`
        : '#333';
    samplesEl.textContent = `(${N} 點取樣)`;
    document.getElementById('btn-learn-ground').textContent = '✅ 已學習';
    document.getElementById('btn-learn-ground').style.background = '#00e676';
}

// 簡易 k-means k=2，輸入 [{r,g,b}]，回傳兩個中心 + 標準差
function kMeans2(samples) {
    if (samples.length < 2) return [{ r:128, g:128, b:128, stddev:30 }];
    // 初始化：選亮度最低和最高的各一個
    const brightness = s => (s.r*299 + s.g*587 + s.b*114) / 1000;
    const sorted = [...samples].sort((a,b) => brightness(a) - brightness(b));
    let c = [
        { ...sorted[0] },
        { ...sorted[sorted.length - 1] }
    ];
    for (let iter = 0; iter < 10; iter++) {
        const groups = [[], []];
        for (const s of samples) {
            const d0 = colorDistance(s.r, s.g, s.b, c[0].r, c[0].g, c[0].b);
            const d1 = colorDistance(s.r, s.g, s.b, c[1].r, c[1].g, c[1].b);
            groups[d0 <= d1 ? 0 : 1].push(s);
        }
        for (let k = 0; k < 2; k++) {
            if (!groups[k].length) continue;
            const avgR = groups[k].reduce((s,x)=>s+x.r,0)/groups[k].length;
            const avgG = groups[k].reduce((s,x)=>s+x.g,0)/groups[k].length;
            const avgB = groups[k].reduce((s,x)=>s+x.b,0)/groups[k].length;
            c[k] = { r: avgR, g: avgG, b: avgB };
        }
        // 計算群內標準差（感知亮度）
        c = c.map((center, k) => {
            if (!groups[k] || !groups[k].length) return { ...center, stddev: 30 };
            const dists = groups[k].map(s => colorDistance(s.r,s.g,s.b,center.r,center.g,center.b));
            const mean = dists.reduce((a,b)=>a+b,0)/dists.length;
            const variance = dists.reduce((a,d)=>a+(d-mean)**2,0)/dists.length;
            return { ...center, stddev: Math.sqrt(variance) };
        });
    }
    return c;
}

// 動態版：判斷像素是否屬於地面顏色（使用學習到的 cluster）
function isGroundTrackColor(r, g, b) {
    if (!groundColorLearned || !groundColorClusters.length) {
        // 尚未學習 → 退回保守備用邏輯（只排除極端情況）
        return false;
    }
    for (const c of groundColorClusters) {
        if (colorDistance(r, g, b, c.r, c.g, c.b) <= c.tolerance) return true;
    }
    return false;
}

// 計算兩顏色的感知距離
function colorDistance(r1, g1, b1, r2, g2, b2) {
    const dr = r1 - r2, dg = g1 - g2, db = b1 - b2;
    // 加權歐氏距離（感知修正）
    const rmean = (r1 + r2) / 2;
    return Math.sqrt((2 + rmean/256)*dr*dr + 4*dg*dg + (2 + (255-rmean)/256)*db*db);
}

function startVisionLoop() {
    const video = document.getElementById('viewfinder');
    const canvas = document.getElementById('vision-canvas');
    const ctx = canvas.getContext('2d', { willReadFrequently: true });

    function processFrame() {
        if (video.paused || video.ended) {
            visionAnimationId = requestAnimationFrame(processFrame);
            return;
        }
        if (canvas.width !== video.videoWidth) {
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            baselineFrame = null;
            baselineCollectCount = 0;
            baselineReady = false;
        }
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

        // 建立背景基線（計時開始後才需要偵測）
        if (!isRunning) {
            // 持續更新基線，直到計時開始
            baselineFrame = ctx.getImageData(0, 0, canvas.width, canvas.height);
            visionAnimationId = requestAnimationFrame(processFrame);
            return;
        }

        // 計時開始後，先收集幾幀穩定基線
        if (!baselineReady) {
            if (baselineCollectCount < BASELINE_FRAMES) {
                if (!baselineFrame) baselineFrame = ctx.getImageData(0, 0, canvas.width, canvas.height);
                baselineCollectCount++;
            } else {
                baselineReady = true;
            }
            visionAnimationId = requestAnimationFrame(processFrame);
            return;
        }

        // === 層1：只取中帶 (35%~75%) 的終點線像素 ===
        const linePixels = sampleLinePixels(ctx, canvas.width, canvas.height);

        if (lastLinePixels && linePixels.length === lastLinePixels.length) {
            let motionDiff = 0;
            let groundColorCount = 0;
            const sampleCount = linePixels.length / 4;

            for (let i = 0; i < linePixels.length; i += 4) {
                const r = linePixels[i], g = linePixels[i+1], b = linePixels[i+2];
                motionDiff += Math.abs(r - lastLinePixels[i]);
                motionDiff += Math.abs(g - lastLinePixels[i+1]);
                motionDiff += Math.abs(b - lastLinePixels[i+2]);

                // 統計地面顏色占比（層3 前置）
                if (isGroundTrackColor(r, g, b)) groundColorCount++;
            }
            const avgMotion = motionDiff / sampleCount;

            // === 層2：背景差分驗證（排除靜態地面數字的微小光線變化）===
            const bgDiff = computeBaselineDiffOnLine(canvas.width, canvas.height);

            // 動態閾值：必須顯著超過背景雜訊 2 倍以上
            const dynamicThreshold = Math.max(45, bgDiff * 2.2);

            // === 層3：地面顏色占比過高時否決 ===
            // 若終點線上超過 60% 的像素都是跑道地面色 → 觸發來源是地面，否決
            const groundRatio = groundColorCount / sampleCount;

            // 更新狀態顯示
            const statusEl = document.getElementById('detection-status');
            if (statusEl) {
                const gPct = Math.round(groundRatio * 100);
                const motion = Math.round(avgMotion);
                const threshold = Math.round(dynamicThreshold);
                const rejected = groundRatio >= 0.6;
                const learnedTag = groundColorLearned ? '' : ' ⚠️未學習地面色';
                statusEl.style.color = crossingCooldown ? '#ff9800' : rejected ? '#ff5252' : motion > threshold ? '#00e676' : '#7a9ab5';
                statusEl.textContent = rejected
                    ? `⛔ 地面色 ${gPct}% 過高，已忽略${learnedTag}`
                    : `動態:${motion} 閾:${threshold} 地面:${gPct}%${crossingCooldown ? ' 冷卻中' : ''}${learnedTag}`;
            }

            if (avgMotion > dynamicThreshold && groundRatio < 0.6 && !crossingCooldown) {
                handleLineCrossing(linePixels);
            }
        }

        lastLinePixels = new Uint8ClampedArray(linePixels);
        visionAnimationId = requestAnimationFrame(processFrame);
    }
    visionAnimationId = requestAnimationFrame(processFrame);
}

// 計算背景基線在終點線上的雜訊量（光線、陰影等自然波動）
function computeBaselineDiffOnLine(w, h) {
    if (!baselineFrame) return 0;
    const N = 20;
    let diff = 0;
    const canvas = document.getElementById('vision-canvas');
    const ctx = canvas.getContext('2d', { willReadFrequently: true });

    // 只取中帶
    const bandTop = Math.floor(h * 0.35);
    const bandBottom = Math.floor(h * 0.75);

    for (let i = 0; i <= N; i++) {
        const t = i / N;
        const x = Math.floor((finishLine.x1 + (finishLine.x2 - finishLine.x1) * t) * w);
        const y = Math.floor((finishLine.y1 + (finishLine.y2 - finishLine.y1) * t) * h);
        const py = Math.max(bandTop, Math.min(bandBottom - 1, y));
        const px = Math.max(0, Math.min(w - 1, x));

        try {
            const cur = ctx.getImageData(px, py, 1, 1).data;
            const baseIdx = (py * w + px) * 4;
            diff += Math.abs(cur[0] - baselineFrame.data[baseIdx]);
            diff += Math.abs(cur[1] - baselineFrame.data[baseIdx + 1]);
            diff += Math.abs(cur[2] - baselineFrame.data[baseIdx + 2]);
        } catch { /* ignore */ }
    }
    return diff / (N + 1);
}

// 沿終點線取樣，僅取中帶（35%~75%），忽略地面帶
function sampleLinePixels(ctx, w, h) {
    const N = 20;
    const pixels = [];
    const bandTop    = h * 0.35;   // 中帶上緣
    const bandBottom = h * 0.75;   // 中帶下緣（75% 以下 = 地面，忽略）

    for (let i = 0; i <= N; i++) {
        const t = i / N;
        const rawX = (finishLine.x1 + (finishLine.x2 - finishLine.x1) * t) * w;
        const rawY = (finishLine.y1 + (finishLine.y2 - finishLine.y1) * t) * h;

        // ★ 只處理中帶範圍內的點，超出範圍填 0（不計入差分）
        if (rawY < bandTop || rawY > bandBottom) {
            pixels.push(0, 0, 0, 0); // alpha=0 標記為「跳過」
            continue;
        }
        const px = Math.max(0, Math.min(w - 1, Math.floor(rawX)));
        const py = Math.max(0, Math.min(h - 1, Math.floor(rawY)));
        try {
            const d = ctx.getImageData(px, py, 1, 1).data;
            pixels.push(d[0], d[1], d[2], d[3]);
        } catch { pixels.push(0, 0, 0, 255); }
    }
    return pixels;
}

// 觸發越線後，從終點線附近擷取主色做號碼衣比對
function extractCrossingZoneColor(canvas, ctx) {
    const w = canvas.width, h = canvas.height;
    const bandTop    = Math.floor(h * 0.35);
    const bandBottom = Math.floor(h * 0.70);
    // 終點線中點附近取 30×80 像素區塊
    const cx = Math.floor(((finishLine.x1 + finishLine.x2) / 2) * w);
    const bx = Math.max(0, cx - 15);
    const by = bandTop;
    const bw = Math.min(30, w - bx);
    const bh = Math.min(80, bandBottom - bandTop);

    try {
        const data = ctx.getImageData(bx, by, bw, bh).data;
        let rS = 0, gS = 0, bS = 0, cnt = 0;
        for (let i = 0; i < data.length; i += 4) {
            // 排除地面色再平均
            if (!isGroundTrackColor(data[i], data[i+1], data[i+2])) {
                rS += data[i]; gS += data[i+1]; bS += data[i+2]; cnt++;
            }
        }
        if (cnt > 0) return { r: Math.round(rS/cnt), g: Math.round(gS/cnt), b: Math.round(bS/cnt) };
    } catch {}
    return null;
}

function handleLineCrossing(linePixels) {
    // 閃光效果
    const flCanvas = document.getElementById('finish-line-canvas');
    const fCtx = flCanvas.getContext('2d');
    const w = flCanvas.width, h = flCanvas.height;
    const x1 = finishLine.x1 * w, y1 = finishLine.y1 * h;
    const x2 = finishLine.x2 * w, y2 = finishLine.y2 * h;
    fCtx.save();
    fCtx.strokeStyle = '#00FF00';
    fCtx.lineWidth = 6;
    fCtx.shadowColor = '#00FF00';
    fCtx.shadowBlur = 20;
    fCtx.beginPath(); fCtx.moveTo(x1, y1); fCtx.lineTo(x2, y2); fCtx.stroke();
    fCtx.restore();
    setTimeout(() => drawFinishLine(), 300);

    crossingCooldown = true;
    setTimeout(() => crossingCooldown = false, 1800);

    // 擷取越線區顏色供號碼衣比對
    const vCanvas = document.getElementById('vision-canvas');
    const vCtx = vCanvas.getContext('2d', { willReadFrequently: true });
    const zoneColor = extractCrossingZoneColor(vCanvas, vCtx);

    triggerAICrossing(zoneColor);
}

// ================================================================
// 模組四：AI 辨識 + 人機協作（含號碼衣顏色比對）
// ================================================================

// 真實越線觸發（由視覺引擎呼叫，帶入越線區顏色）
function triggerAICrossing(zoneColor) {
    if (!isRunning) return;
    const active = students.filter(s => s.currentLap < targetLaps);
    if (!active.length) return;
    pushAIQueueItem(active, zoneColor);
}

// 模擬越線（手動測試按鈕用）
function simulateAICrossing() {
    if (!isRunning) return;
    const active = students.filter(s => s.currentLap < targetLaps);
    if (!active.length) return;
    pushAIQueueItem(active, null);
}

function pushAIQueueItem(active, zoneColor) {
    let detectedStudent = null;
    let detectedBib = null;
    let confidence = 0;
    let matchReason = '';

    // ★ 顏色比對：用越線區主色與 visionProfiles 比對
    if (zoneColor && visionProfiles.length > 0) {
        let bestDist = Infinity, bestProfile = null;
        for (const p of visionProfiles) {
            const pr = parseInt(p.bibColor.slice(1,3),16);
            const pg = parseInt(p.bibColor.slice(3,5),16);
            const pb = parseInt(p.bibColor.slice(5,7),16);
            const dist = colorDistance(zoneColor.r, zoneColor.g, zoneColor.b, pr, pg, pb);
            if (dist < bestDist) { bestDist = dist; bestProfile = p; }
        }
        if (bestProfile && bestDist < 80) {
            const student = active.find(s => s.bib === bestProfile.number);
            if (student) {
                detectedStudent = student;
                detectedBib = student.bib;
                confidence = Math.round(Math.max(60, 100 - bestDist * 0.6));
                matchReason = '色彩比對';
            }
        }
    }

    // 次選：有 profile 的學生中隨機
    if (!detectedStudent && visionProfiles.length > 0) {
        const profiledStudents = active.filter(s => visionProfiles.find(p => p.number === s.bib));
        if (profiledStudents.length > 0) {
            detectedStudent = profiledStudents[Math.floor(Math.random() * profiledStudents.length)];
            detectedBib = detectedStudent.bib;
            confidence = 45 + Math.floor(Math.random() * 20);
            matchReason = '特徵推測';
        }
    }

    // 備用：無特徵時隨機
    if (!detectedStudent) {
        detectedStudent = active[Math.floor(Math.random() * active.length)];
        detectedBib = detectedStudent.bib;
        confidence = 25 + Math.floor(Math.random() * 20);
        matchReason = '需確認';
    }

    const exactTs = difference;
    aiQueue.push({
        uid: aiQueueCounter++,
        studentId: detectedStudent.id,
        bib: detectedBib,
        name: detectedStudent.name,
        timestampDiff: exactTs,
        timeStr: formatTime(exactTs),
        confidence,
        matchReason
    });
    renderAIQueue();
}

function renderAIQueue() {
    const c = document.getElementById('ai-queue-container');
    c.innerHTML = '';
    if (!aiQueue.length) {
        c.innerHTML = '<span style="color:var(--muted); font-size:0.85rem;">目前無撞線動態</span>';
        return;
    }
    aiQueue.forEach(item => {
        const card = document.createElement('div');
        card.className = 'ai-card';
        const confColor = item.confidence >= 70 ? 'var(--green)' : item.confidence >= 50 ? 'var(--yellow)' : 'var(--red)';
        const reasonIcon = item.matchReason === '色彩比對' ? '🎽' : item.matchReason === '特徵推測' ? '🔍' : '⚠️';
        card.innerHTML = `
            <div class="bib-tag">${item.bib}</div>
            <div>
                <div class="ai-name">${item.name}</div>
                <div class="ai-time">⏱ ${item.timeStr} &nbsp;<span style="color:${confColor}">${reasonIcon}${item.confidence}%</span></div>
            </div>
            <button class="ai-ok" onclick="confirmAI(${item.uid})">✔</button>
            <button class="ai-edit" onclick="openCorrection(${item.uid})">✏️</button>
            <button class="ai-no" onclick="discardAI(${item.uid})">✕</button>
        `;
        c.appendChild(card);
    });
}

function confirmAI(uid) {
    const idx = aiQueue.findIndex(q => q.uid === uid);
    if (idx > -1) {
        recordLap(aiQueue[idx].studentId, aiQueue[idx].timestampDiff);
        aiQueue.splice(idx, 1);
        renderAIQueue();
    }
}

function discardAI(uid) {
    const idx = aiQueue.findIndex(q => q.uid === uid);
    if (idx > -1) { aiQueue.splice(idx, 1); renderAIQueue(); }
}

// 開啟手動修正彈窗
function openCorrection(uid) {
    const item = aiQueue.find(q => q.uid === uid);
    if (!item) return;
    pendingCorrectionUid = uid;
    document.getElementById('correction-detected-display').textContent = item.bib;
    document.getElementById('correction-input').value = '';
    document.getElementById('correction-modal').classList.add('active');
    document.getElementById('correction-input').focus();
}

function confirmCorrection() {
    const newBib = document.getElementById('correction-input').value.trim();
    if (!newBib) { alert('請輸入正確號碼！'); return; }

    const idx = aiQueue.findIndex(q => q.uid === pendingCorrectionUid);
    if (idx > -1) {
        // 找到對應學生
        const student = students.find(s => s.bib === newBib);
        if (student) {
            aiQueue[idx].studentId = student.id;
            aiQueue[idx].bib = newBib;
            aiQueue[idx].name = student.name;
        } else {
            // 號碼不在名單：直接更新顯示，但不能記錄
            aiQueue[idx].bib = newBib;
            aiQueue[idx].name = `#${newBib} (未知)`;
        }
        renderAIQueue();
    }
    cancelCorrection();
}

function cancelCorrection() {
    pendingCorrectionUid = null;
    document.getElementById('correction-modal').classList.remove('active');
}

// ================================================================
// 計時器
// ================================================================
function updateTimer() {
    if (!isRunning) return;
    difference = Date.now() - startTime + timeSaved;
    document.getElementById('timer').textContent = formatTime(difference);
    timerAnimationId = requestAnimationFrame(updateTimer);
}

function startTimer() {
    if (!isRunning) {
        startTime = Date.now();
        isRunning = true;
        timerAnimationId = requestAnimationFrame(updateTimer);
        document.getElementById('btn-start').style.display = 'none';
        document.getElementById('btn-pause').style.display = 'inline-block';
        document.getElementById('btn-zero').style.display = 'inline-block';
        document.getElementById('btn-finish').style.display = 'inline-block';
    }
}

function pauseTimer() {
    if (isRunning) {
        isRunning = false;
        cancelAnimationFrame(timerAnimationId);
        timeSaved = difference;
        document.getElementById('btn-pause').textContent = '繼續';
    } else {
        startTime = Date.now();
        isRunning = true;
        timerAnimationId = requestAnimationFrame(updateTimer);
        document.getElementById('btn-pause').textContent = '暫停';
    }
}

function zeroTimer() {
    if (!confirm('確定歸零並清除所有紀錄？')) return;
    isRunning = false; cancelAnimationFrame(timerAnimationId);
    startTime = Date.now(); timeSaved = 0; difference = 0;
    document.getElementById('timer').textContent = '00:00.00';
    aiQueue = []; renderAIQueue();
    students.forEach(s => { s.currentLap = 0; s.lapTimes = []; s.lapSplitTimes = []; s.lastLapTimeMs = 0; s.lastLapTimeDifference = 0; });
    document.getElementById('btn-start').style.display = 'inline-block';
    document.getElementById('btn-pause').style.display = 'none';
    document.getElementById('btn-finish').style.display = 'none';
    renderGrid();
}

function finishTest() {
    isRunning = false; cancelAnimationFrame(timerAnimationId);
    document.getElementById('btn-pause').style.display = 'none';
    document.getElementById('download-section').classList.add('active');
}

// ================================================================
// 記錄圈數
// ================================================================
function renderGrid() {
    const grid = document.getElementById('student-grid');
    grid.innerHTML = '';
    const sorted = students.map((s, i) => ({ ...s, origIdx: i }));
    sorted.sort((a, b) => {
        if (a.currentLap !== b.currentLap) return b.currentLap - a.currentLap;
        if (a.currentLap === 0) return parseInt(a.bib) - parseInt(b.bib);
        return a.lastLapTimeDifference - b.lastLapTimeDifference;
    });

    sorted.forEach((student, pos) => {
        const btn = document.createElement('button');
        btn.id = `sbtn-${student.origIdx}`;
        btn.className = 'student-btn' + (student.currentLap === 0 ? '' : student.currentLap >= targetLaps ? ' finished' : student.currentLap === targetLaps - 1 ? ' last-lap' : ' running');
        btn.style.order = pos;
        const bibHtml = student.bib !== '-' ? `<div class="bib-badge">#${student.bib}</div>` : '';
        if (student.currentLap >= targetLaps) {
            btn.innerHTML = `${bibHtml}<b>${student.name}</b><span>✅ ${student.lapTimes.at(-1)}</span>`;
        } else {
            btn.innerHTML = `${bibHtml}<b>${student.name}</b><span>${student.currentLap}/${targetLaps}</span>`;
        }
        btn.onclick = () => recordLap(student.origIdx, null);
        grid.appendChild(btn);
    });
}

function recordLap(index, customTs = null) {
    if (!isRunning) return;
    const s = students[index];
    if (s.currentLap >= targetLaps) return;
    const lapDiff = customTs !== null ? customTs : difference;
    const now = Date.now();
    if (s.lastLapTimeMs > 0 && (now - s.lastLapTimeMs) < 5000) {
        if (!confirm('【防誤觸】確定紀錄此圈？')) return;
    }
    s.currentLap++;
    const split = lapDiff - s.lastLapTimeDifference;
    s.lapTimes.push(formatTime(lapDiff));
    s.lapSplitTimes.push(formatTime(split));
    s.lastLapTimeMs = now;
    s.lastLapTimeDifference = lapDiff;
    renderGrid();

    const btn = document.getElementById(`sbtn-${index}`);
    if (btn) {
        btn.classList.add('just-crossed');
        const bibHtml = s.bib !== '-' ? `<div class="bib-badge">#${s.bib}</div>` : '';
        btn.innerHTML = `${bibHtml}<b>${s.name}</b><span style="color:var(--green); font-weight:700;">圈: ${formatTime(split)}</span>`;
        if (s.timeoutId) clearTimeout(s.timeoutId);
        s.timeoutId = setTimeout(() => renderGrid(), 2500);
    }
}

// ================================================================
// 匯出 Excel
// ================================================================
function exportExcel() {
    const data = students.map(s => {
        const row = { 號碼: s.bib, 姓名: s.name, 完成圈數: `${s.currentLap}/${targetLaps}`, 總成績: s.currentLap === targetLaps ? s.lapTimes.at(-1) : '未完賽' };
        for (let i = 0; i < targetLaps; i++) row[`第${i+1}圈`] = s.lapSplitTimes[i] || '-';
        return row;
    });
    const ws = XLSX.utils.json_to_sheet(data);
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, '測驗成績');
    XLSX.writeFile(wb, `LapTime_${Date.now()}.xlsx`);
    document.getElementById('download-section').classList.remove('active');
}

// ================================================================
// 工具函式

function formatTime(ms) {
    const m = Math.floor(ms / 60000);
    const s = Math.floor((ms % 60000) / 1000);
    const cs = Math.floor((ms % 1000) / 10);
    return `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}.${String(cs).padStart(2,'0')}`;
}

function toggleFullScreen() {
    if (!document.fullscreenElement) document.documentElement.requestFullscreen();
    else document.exitFullscreen();
}

// 鍵盤快捷鍵
document.addEventListener('keydown', e => {
    if (e.key === 'Escape') {
        cancelCorrection();
        if (lineEditMode) saveFinishLine();
    }
    if (e.key === 'Enter' && document.getElementById('correction-modal').classList.contains('active')) {
        confirmCorrection();
    }
});
</script>
